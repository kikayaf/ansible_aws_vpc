# ansible.cfg — project-level Ansible configuration
# Values here override /etc/ansible/ansible.cfg and ~/.ansible.cfg.
# Docs: https://docs.ansible.com/ansible/latest/reference_appendices/config.html

[defaults]
# ── Inventory ────────────────────────────────────────────────────────────────
# Both playbooks run on localhost; a minimal inventory file is provided so
# Ansible never falls back to /etc/ansible/hosts.
inventory = ./inventory

# ── Python interpreter ────────────────────────────────────────────────────────
# Suppress the "interpreter discovery" warning that appears on Python 3 hosts.
interpreter_python = auto_silent

# ── Output & logging ─────────────────────────────────────────────────────────
# 'yaml' callback produces clean, indented output that is easier to read than
# the default 'minimal' format, especially for the long vpc_setup.yml run.
stdout_callback = yaml

# Enable timer (shows total run time) and profile_tasks (per-task timing).
# Useful for identifying slow AWS API calls (e.g. NAT Gateway creation).
callbacks_enabled = timer, profile_tasks

# Write a timestamped log alongside each run.  Rotate or delete ansible.log
# as needed; it is excluded from git via .gitignore.
log_path = ./ansible.log

# ── Retry files ───────────────────────────────────────────────────────────────
# Disable .retry files — they clutter the working directory and are not useful
# for localhost-only playbooks.
retry_files_enabled = False

# ── Host key checking ─────────────────────────────────────────────────────────
# Newly created Bastion EC2 instances will not be in known_hosts.
# Set to False so the first SSH connection (if any) is not blocked.
# For ongoing operations you may want to re-enable this and add the host key.
host_key_checking = False

# ── Roles & collections ───────────────────────────────────────────────────────
# Conventional paths relative to the project root.
roles_path    = ./roles
collections_path = ./collections

# ── Fact caching ──────────────────────────────────────────────────────────────
# Both playbooks use gather_facts: false, so caching is disabled by default.
# Uncomment the three lines below if you add plays that do gather facts and
# want to avoid repeated slow AWS metadata lookups.
#
# gathering        = smart
# fact_caching     = jsonfile
# fact_caching_connection = ./.ansible_cache

# ── Miscellaneous ─────────────────────────────────────────────────────────────
# Suppress deprecation warnings that come from older community.aws modules
# (e.g. ec2_group, ec2_vpc_nat_gateway) until the project is migrated to FQCN.
deprecation_warnings = False

[ssh_connection]
# Pipelining reduces the number of SSH connections Ansible makes and can speed
# up remote tasks significantly.  Safe to enable here; the Bastion host is the
# only potential SSH target.
pipelining = True

# Use persistent control sockets to avoid re-establishing SSH per task.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
